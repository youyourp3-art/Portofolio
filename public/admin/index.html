<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Panel admin — Portfolio</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #161f1b;
        color: #f7f6ef;
      }
      #lang-picker {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        text-align: center;
        padding: 24px;
      }
      #lang-picker h1 {
        font-size: 22px;
        font-weight: 500;
        margin: 0;
      }
      #lang-picker .buttons {
        display: flex;
        gap: 12px;
      }
      #lang-picker button {
        font-family: monospace;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 14px 28px;
        border: 1px solid rgba(247, 246, 239, 0.3);
        background: transparent;
        color: #f7f6ef;
        cursor: pointer;
      }
      #lang-picker button:hover {
        border-color: #c1451d;
        color: #c1451d;
      }
      #cms-root { display: none; }
      #lang-switch-btn {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 99999;
        font-family: monospace;
        font-size: 11px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 8px 12px;
        border: 1px solid #b9c2af;
        background: #f7f6ef;
        color: #161f1b;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="lang-picker">
      <h1>Choisis la langue du panel / Sprache des Panels wählen</h1>
      <div class="buttons">
        <button id="pick-fr">Français</button>
        <button id="pick-de">Deutsch</button>
      </div>
    </div>
    <div id="cms-root"></div>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      function startCms(lang) {
        localStorage.setItem("cms-lang", lang);
        document.getElementById("lang-picker").style.display = "none";
        document.getElementById("cms-root").style.display = "block";

        var link = document.createElement("link");
        link.rel = "cms-config-url";
        link.href = lang === "de" ? "/admin/config-de.yml" : "/admin/config.yml";
        document.head.appendChild(link);

        var script = document.createElement("script");
        script.src = "https://unpkg.com/decap-cms@^3/dist/decap-cms.js";
        document.body.appendChild(script);

        var switchBtn = document.createElement("button");
        switchBtn.id = "lang-switch-btn";
        switchBtn.textContent = lang === "de" ? "FR wechseln" : "Passer en DE";
        switchBtn.onclick = function () {
          localStorage.removeItem("cms-lang");
          location.reload();
        };
        document.body.appendChild(switchBtn);
      }

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }

      var saved = localStorage.getItem("cms-lang");
      if (saved === "fr" || saved === "de") {
        startCms(saved);
      } else {
        document.getElementById("pick-fr").addEventListener("click", function () { startCms("fr"); });
        document.getElementById("pick-de").addEventListener("click", function () { startCms("de"); });
      }
    </script>
  </body>
</html>
